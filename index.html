<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>نور احمد ٹائرز | جدید بینکنگ سسٹم</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --bg-primary: #f4f7fc;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #1e2a3e;
      --text-secondary: #5a6e8a;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --income: #10b981;
      --expense: #ef4444;
      --border-light: #e2e8f0;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --nav-bg: rgba(255,255,255,0.96);
    }

    body.dark {
      --bg-primary: #1a1124;
      --surface: #2d1b36;
      --card-bg: #2d1b36;
      --text-primary: #f3e8ff;
      --text-secondary: #c4b5fd;
      --border-light: #4a3a5c;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --nav-bg: #2d1b36e6;
      --accent-light: #4a3a5c;
      --accent: #a78bfa;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.2s ease;
      line-height: 1.6;
    }

    .app-container {
      width: 100%;
      max-width: 550px;
      margin: 0 auto;
      background: var(--bg-primary);
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    .app-header {
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }
    
    .logo-area { text-align: center; flex: 1; }
    .logo { font-weight: 700; font-size: clamp(0.9rem, 4vw, 1.1rem); color: var(--accent); letter-spacing: -0.3px; }
    .subtitle { font-size: 0.7rem; color: var(--text-secondary); }
    .header-actions { display: flex; gap: 12px; }
    
    .moon-btn {
      background: var(--bg-primary); border: none; border-radius: 50%; width: 40px; height: 40px;
      font-size: 1.2rem; color: var(--text-primary); cursor: pointer; display: flex;
      align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: 0.1s;
    }
    .moon-btn:active { transform: scale(0.94);}

    .bottom-nav {
      position: fixed; bottom: 0; right: 0; left: 0; max-width: 550px; margin: 0 auto;
      background: var(--nav-bg); backdrop-filter: blur(12px); display: flex;
      justify-content: space-around; padding: 10px 10px 22px; border-top: 1px solid var(--border-light); z-index: 20;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent;
      border: none; font-size: 0.65rem; color: var(--text-secondary); cursor: pointer; font-weight: 500;
      flex: 1;
    }
    .nav-item i { font-size: 1.3rem; }
    .nav-item.active { color: var(--accent); transform: translateY(-2px); }

    .card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin: 12px 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
    
    .stats-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 16px; }
    .stat-card { 
      flex: 1 1 calc(33.33% - 10px); 
      min-width: 95px;
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 12px 8px; 
      box-shadow: var(--shadow-sm); 
      text-align: center; 
    }
    .stat-title { font-size: 0.7rem; color: var(--text-secondary); }
    .stat-amount { 
      font-size: clamp(0.9rem, 4vw, 1.1rem); 
      font-weight: 700; 
      margin-top: 4px; 
      word-break: break-all;
    }
    
    .income-color { color: var(--income); }
    .expense-color { color: var(--expense); }

    .filter-bar { margin: 12px 16px; display: flex; flex-wrap: wrap; gap: 6px; background: var(--surface); border-radius: 20px; padding: 8px; justify-content: center;}
    .filter-chip { background: var(--bg-primary); border: 1px solid var(--border-light); border-radius: 30px; padding: 6px 10px; font-size: 0.7rem; cursor: pointer; flex-grow: 1; text-align: center; white-space: nowrap;}
    .filter-chip.active { background: var(--accent); color: white; }
    
    .report-table { overflow-x: auto; font-size: 0.75rem; width: 100%; }
    .report-table table { width: 100%; border-collapse: collapse; min-width: 300px; }
    .report-table th, .report-table td { border-bottom: 1px solid var(--border-light); padding: 8px 4px; text-align: right; word-break: break-word; }
    
    .share-btn { background: var(--accent); color: white; border: none; border-radius: 40px; padding: 12px; margin-top: 12px; width: 100%; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    
    .customer-card, .transaction-card { background: var(--card-bg); border-radius: 20px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow-sm); }
    .view-btn { background: var(--accent-light); border: none; padding: 8px 14px; border-radius: 30px; font-weight: 500; color: var(--accent); cursor: pointer; font-size: 0.8rem; white-space: nowrap;}
    
    .edit-icon, .delete-icon { cursor: pointer; margin: 0 4px; font-size: 1.2rem; padding: 8px; border-radius: 50%; background: var(--accent-light); transition: 0.1s; display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: var(--surface); width: 92%; max-width: 380px; border-radius: 24px; padding: 20px; max-height: 85vh; overflow-y: auto; }
    input, select, textarea { width: 100%; padding: 12px 10px; margin: 6px 0; border-radius: 16px; border: 1px solid var(--border-light); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; }
    
    .btn-primary { background: var(--accent); border: none; padding: 12px; border-radius: 40px; color: white; font-weight: 600; width: 100%; margin-top: 12px; cursor: pointer; font-size: 0.9rem; }
    
    .circle-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); flex-shrink: 0;}
    
    .fab-add { position: fixed; bottom: 85px; left: 20px; background: var(--accent); width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; box-shadow: var(--shadow-md); cursor: pointer; z-index: 15; }
    .hidden { display: none !important; }
    
    .transaction-item { 
      display: grid; 
      grid-template-columns: 1fr auto; 
      align-items: center; 
      padding: 12px 0; 
      border-bottom: 1px solid var(--border-light); 
      gap: 10px; 
    }
    .transaction-item > div:first-child { min-width: 0; }
    
    .credit, .debit { font-weight: bold; font-size: 0.9rem; word-break: break-all; text-align: left;}
    .running-balance { font-size: 0.7rem; color: var(--text-secondary); word-break: break-all; grid-column: 1 / -1; }
    
    #qrcode { display: flex; justify-content: center; margin: 12px 0; }
    
    @media (max-width: 380px) {
      .stat-card { flex: 1 1 100%; }
      .stats-grid { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="loginContainer" class="app-container" style="display: flex; align-items: center; justify-content: center;">
  <div class="card" style="width: 85%; text-align: center;">
    <h2 style="font-size:1.3rem;">🚛 نور احمد ٹائرز</h2>
    <p>پیشگی بقایا نظام</p>
    <input type="email" id="loginEmail" placeholder="ای میل">
    <input type="password" id="loginPassword" placeholder="پاس ورڈ">
    <button class="btn-primary" id="loginBtn">لاگ ان</button>
  </div>
</div>

<div id="appContainer" class="app-container hidden">
  <div class="app-header">
    <div class="header-actions">
      <button class="moon-btn" id="darkModeToggle"><i class="fas fa-moon"></i></button>
      <button class="moon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div class="logo-area">
      <div class="logo">نور احمد پرانا ٹائر ڈیلر</div>
      <div class="subtitle">کچلاک</div>
    </div>
    <div style="width: 80px;"></div>
  </div>

  <div id="dashboardView" class="view"></div>
  <div id="customersView" class="view hidden"></div>
  <div id="transactionsView" class="view hidden"></div>
  <div id="profileView" class="view hidden"></div>
  <div id="shareView" class="view hidden"></div>

  <div class="bottom-nav">
    <button class="nav-item" data-nav="dashboard"><i class="fas fa-chart-line"></i><span>ڈیش بورڈ</span></button>
    <button class="nav-item" data-nav="customers"><i class="fas fa-users"></i><span>کسٹمرز</span></button>
    <button class="nav-item" data-nav="transactions"><i class="fas fa-history"></i><span>ٹرانزیکشنز</span></button>
    <button class="nav-item" data-nav="share"><i class="fas fa-share-alt"></i><span>شئر</span></button>
  </div>
  <div id="fabAddCustomer" class="fab-add hidden"><i class="fas fa-plus"></i></div>
</div>

<script>
  // ---------- Firebase Setup ----------
  const firebaseConfig = {
    apiKey: "AIzaSyB-zDLPniTv865DgeHSpPmgjzTyCpvpKNI",
    authDomain: "banking-d3fa9.firebaseapp.com",
    databaseURL: "https://banking-d3fa9-default-rtdb.firebaseio.com",
    projectId: "banking-d3fa9",
    storageBucket: "banking-d3fa9.firebasestorage.app",
    messagingSenderId: "25954993122",
    appId: "1:25954993122:web:1b84dcd4ace6606dab6fbb",
    measurementId: "G-M2LS4E2VBD"
  };

  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const auth = firebase.auth();
  const db = firebase.database();

  // ---------- Data Model ----------
  let customers = [];     
  let transactions = [];  
  let bankDetails = { name: "نور احمد پرانا ٹائر ڈیلر کچلاک", account: "PK36 NOOR 987654321", logo: "" };
  let currentCustomerProfileId = null;

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
  function getBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  function loadData() {
    db.ref('customers').on('value', snap => {
      let custData = snap.val();
      customers = custData ? (Array.isArray(custData) ? custData : Object.values(custData)) : [];
      refreshActiveView();
    });
    db.ref('transactions').on('value', snap => {
      let txnsData = snap.val();
      transactions = txnsData ? (Array.isArray(txnsData) ? txnsData : Object.values(txnsData)) : [];
      refreshActiveView();
    });
    db.ref('bankDetails').on('value', snap => {
      if (snap.val()) bankDetails = snap.val();
      if(activeTab === 'share') renderShareSection();
    });
  }

  function saveCustomers() { db.ref('customers').set(customers); }
  function saveTransactions() { db.ref('transactions').set(transactions); }
  function saveBankDetails() { db.ref('bankDetails').set(bankDetails); }

  function refreshActiveView() {
    if(activeTab === "dashboard" && !document.getElementById("dashboardView").classList.contains("hidden")) renderDashboard();
    if(activeTab === "customers" && !document.getElementById("customersView").classList.contains("hidden")) renderCustomersList();
    if(activeTab === "transactions" && !document.getElementById("transactionsView").classList.contains("hidden")) renderGlobalTransactions();
    if(!document.getElementById("profileView").classList.contains("hidden") && currentCustomerProfileId) showCustomerProfile(currentCustomerProfileId);
  }

  function getCustomerBalance(custId) {
    let balance = 0;
    transactions.filter(t => t.customerId === custId).forEach(t => {
      if (t.type === "Credit") balance += t.amount; else balance -= t.amount;
    });
    return balance;
  }

  function getTotals() {
    let totalIncome = 0, totalExpense = 0;
    transactions.forEach(t => {
      if (t.type === "Credit") totalIncome += t.amount; else totalExpense += t.amount;
    });
    let totalBalance = customers.reduce((sum, c) => sum + getCustomerBalance(c.id), 0);
    return { totalBalance, totalIncome, totalExpense };
  }

  function filterTransactionsByDateRange(transactionsArray, filterType, customStart = null, customEnd = null) {
    const now = new Date();
    let startDate, endDate = new Date();
    if (filterType === 'today') { startDate = new Date(now.setHours(0,0,0,0)); endDate = new Date(now.setHours(23,59,59,999)); }
    else if (filterType === 'week') { const firstDay = new Date(now.setDate(now.getDate() - now.getDay())); startDate = new Date(firstDay.setHours(0,0,0,0)); endDate = new Date(); }
    else if (filterType === 'month') { startDate = new Date(now.getFullYear(), now.getMonth(), 1); endDate = new Date(); }
    else if (filterType === 'year') { startDate = new Date(now.getFullYear(), 0, 1); endDate = new Date(); }
    else if (filterType === 'custom' && customStart && customEnd) { startDate = new Date(customStart); endDate = new Date(customEnd); endDate.setHours(23,59,59); }
    else { return transactionsArray; }
    return transactionsArray.filter(t => new Date(t.date) >= startDate && new Date(t.date) <= endDate);
  }

  let reportFilter = 'all'; let reportStart = '', reportEnd = '';
  function renderDashboard() {
    const { totalBalance, totalIncome, totalExpense } = getTotals();
    let filteredTxns = [...transactions];
    if (reportFilter !== 'all') { filteredTxns = filterTransactionsByDateRange(filteredTxns, reportFilter, reportStart, reportEnd); }
    filteredTxns.sort((a,b) => new Date(b.date) - new Date(a.date));
    let filteredIncome = filteredTxns.filter(t=>t.type==="Credit").reduce((s,t)=>s+t.amount,0);
    let filteredExpense = filteredTxns.filter(t=>t.type==="Debit").reduce((s,t)=>s+t.amount,0);
    
    let tableRows = filteredTxns.map(t => {
      let cust = customers.find(c=>c.id===t.customerId);
      return `<tr><td>${cust ? cust.name : '?'}</td><td>${new Date(t.date).toLocaleDateString('ur-PK')}</td><td>${cust?.accountNumber || '-'}</td><td>${t.type === 'Credit' ? 'وصول' : 'ادائیگی'}</td><td>${t.amount.toLocaleString()}</td></tr>`;
    }).join('');

    let html = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-title">کل بیلنس</div><div class="stat-amount">${totalBalance.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-title">کل آمد</div><div class="stat-amount income-color">+${totalIncome.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-title">کل ادائیگی</div><div class="stat-amount expense-color">-${totalExpense.toLocaleString()}</div></div>
      </div>
      <div class="filter-bar">
        <span class="filter-chip ${reportFilter==='all'?'active':''}" data-filter="all">تمام</span>
        <span class="filter-chip ${reportFilter==='today'?'active':''}" data-filter="today">آج</span>
        <span class="filter-chip ${reportFilter==='week'?'active':''}" data-filter="week">ہفتہ</span>
        <span class="filter-chip ${reportFilter==='month'?'active':''}" data-filter="month">ماہ</span>
        <span class="filter-chip ${reportFilter==='custom'?'active':''}" data-filter="custom">تاریخ</span>
      </div>
      <div class="date-range ${reportFilter==='custom'?'':'hidden'}" style="margin:0 16px 12px; display:flex; gap:8px">
        <input type="date" id="reportStart" value="${reportStart}"><input type="date" id="reportEnd" value="${reportEnd}"><button class="view-btn" id="applyReportFilter">لگائیں</button>
      </div>
      <div class="card">
        <h4 style="font-size:0.9rem;">📊 رپورٹ (${filteredTxns.length})</h4>
        <div class="report-table">
          <table>
            <thead><tr><th>کسٹمر</th><th>تاریخ</th><th>اکاؤنٹ</th><th>قسم</th><th>رقم</th></tr></thead>
            <tbody>${tableRows || '<tr><td colspan="5">کوئی ڈیٹا نہیں</td></tr>'}</tbody>
          </table>
        </div>
        <button id="shareReportPdfBtn" class="share-btn"><i class="fas fa-file-pdf"></i> رپورٹ شیئر کریں</button>
      </div>
    `;
    document.getElementById("dashboardView").innerHTML = html;
    document.querySelectorAll(".filter-chip").forEach(chip => {
      chip.addEventListener("click", () => { reportFilter = chip.dataset.filter; if(reportFilter !== 'custom') { reportStart = reportEnd = ''; } renderDashboard(); });
    });
    document.getElementById("applyReportFilter")?.addEventListener("click", () => { reportStart = document.getElementById("reportStart").value; reportEnd = document.getElementById("reportEnd").value; if(reportStart && reportEnd) renderDashboard(); else alert("تاریخ منتخب کریں"); });
    document.getElementById("shareReportPdfBtn")?.addEventListener("click", () => generateAndSharePDFReport(filteredTxns, filteredIncome, filteredExpense));
  }

  async function generateAndSharePDFReport(transactionsList, totalIn, totalOut) {
    const element = document.createElement('div');
    element.className = 'report-for-share';
    let rows = transactionsList.map(t => {
      let cust = customers.find(c=>c.id===t.customerId);
      return `<tr><td>${cust?.name || '-'}</td><td>${new Date(t.date).toLocaleDateString('ur-PK')}</td><td>${cust?.accountNumber || '-'}</td><td>${t.type === 'Credit' ? 'وصول' : 'ادائیگی'}</td><td>${t.amount.toLocaleString()}</td><td>${t.description || ''}</td></tr>`;
    }).join('');
    element.innerHTML = `<h2 style="color:#4f46e5">نور احمد پرانا ٹائر ڈیلر</h2><h3>رپورٹ: ${new Date().toLocaleDateString('ur-PK')}</h3><table border="1" cellpadding="5" style="width:100%; border-collapse:collapse"><thead><tr><th>کسٹمر</th><th>تاریخ</th><th>اکاؤنٹ</th><th>قسم</th><th>رقم</th><th>تفصیل</th></tr></thead><tbody>${rows}</tbody></table><p>کل وصول: ${totalIn.toLocaleString()} | کل ادائیگی: ${totalOut.toLocaleString()}</p>`;
    document.body.appendChild(element);
    try {
      const canvas = await html2canvas(element, { scale: 2 });
      const imgData = canvas.toDataURL('image/png');
      if (navigator.share) { const blob = await (await fetch(imgData)).blob(); await navigator.share({ title: 'رپورٹ', files: [new File([blob], 'report.png', { type: 'image/png' })] }); }
      else { const link = document.createElement('a'); link.href = imgData; link.download = 'report.png'; link.click(); }
    } catch(e) { alert("Error sharing"); } finally { element.remove(); }
  }

  function renderCustomersList(search = "") {
    let filtered = customers.filter(c => c.name.includes(search) || (c.phone && c.phone.includes(search)));
    let html = `<div class="search-bar" style="margin:12px 16px; background:var(--surface); border-radius:40px; padding:6px 12px;"><i class="fas fa-search"></i><input type="text" id="custSearch" placeholder="تلاش کریں..." value="${search}"></div><div class="customer-grid">`;
    filtered.forEach(c => {
      let balance = getCustomerBalance(c.id);
      let avatar = c.profilePic ? `<img src="${c.profilePic}" class="circle-img" style="width:50px;height:50px">` : `<div style="width:50px;height:50px; border-radius:50%; background:var(--accent-light); display:flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>`;
      html += `<div class="customer-card" style="display:flex; align-items:center; gap:12px;">${avatar}<div style="flex:1"><h4>${c.name}</h4><small>بیلنس: ${balance.toLocaleString()} PKR</small></div><button class="view-btn" data-id="${c.id}">پروفائل</button></div>`;
    });
    html += `</div>`;
    document.getElementById("customersView").innerHTML = html;
    document.getElementById("custSearch")?.addEventListener("input", e => renderCustomersList(e.target.value));
    document.querySelectorAll("[data-id]").forEach(btn => btn.addEventListener("click", () => showCustomerProfile(btn.dataset.id)));
  }

  function showCustomerProfile(custId) {
    currentCustomerProfileId = custId;
    const cust = customers.find(c=>c.id===custId);
    if(!cust) return;
    let custTxns = transactions.filter(t=>t.customerId===custId).sort((a,b)=>new Date(a.date)-new Date(b.date));
    let balance = getCustomerBalance(custId);
    let running = 0;
    
    let txnHtml = custTxns.map(t => {
      if(t.type==="Credit") running += t.amount; else running -= t.amount;
      let receiptHtml = t.receiptUrl ? `<br><img src="${t.receiptUrl}" style="max-width:80px; border-radius:8px; cursor:pointer;" onclick="window.open(this.src)">` : '';
      return `<div class="transaction-item"><div><small>${new Date(t.date).toLocaleString('ur-PK')}</small><div>${t.description} ${receiptHtml}</div></div><div class="${t.type==="Credit"?"credit income-color":"debit expense-color"}">${t.type==="Credit"?"+":"-"} ${t.amount.toLocaleString()}</div><div class="running-balance">بقایا: ${running.toLocaleString()}</div><div style="grid-column: 2; text-align:left;"><i class="fas fa-edit edit-txn edit-icon" data-id="${t.id}"></i> <i class="fas fa-trash delete-txn delete-icon" data-id="${t.id}"></i></div></div>`;
    }).join("");
    
    let avatar = cust.profilePic ? `<img src="${cust.profilePic}" class="circle-img">` : `<div class="circle-img" style="background:var(--accent-light); display:flex; align-items:center; justify-content:center;"><i class="fas fa-user fa-2x"></i></div>`;
    let html = `<button class="back-button" id="backBtn"><i class="fas fa-arrow-right"></i> واپس</button>
    <div class="card" style="text-align:center">${avatar}<h2>${cust.name}</h2><div style="font-size:1.4rem; font-weight:700;">${balance.toLocaleString()} PKR</div></div>
    <div style="display:flex; gap:8px; margin:0 16px"><button id="receiveBtn" class="view-btn" style="flex:1; background:#10b98120">وصول</button><button id="sendBtn" class="view-btn" style="flex:1; background:#ef444420">ادائیگی</button></div>
    <div class="card"><h4>ہسٹری</h4>${txnHtml || "کوئی ریکارڈ نہیں"}</div>`;
    
    document.getElementById("profileView").innerHTML = html;
    document.getElementById("backBtn").onclick = () => { currentCustomerProfileId = null; switchTab("customers"); };
    document.getElementById("receiveBtn").onclick = () => openTransactionModal(custId, "Credit", "وصولی درج کریں");
    document.getElementById("sendBtn").onclick = () => openTransactionModal(custId, "Debit", "ادائیگی درج کریں");
    document.querySelectorAll(".edit-txn").forEach(btn => btn.onclick = () => openEditTransactionModal(btn.dataset.id, custId));
    document.querySelectorAll(".delete-txn").forEach(btn => btn.onclick = () => { if(confirm("حذف کریں؟")) deleteTransaction(btn.dataset.id); });
    
    hideAllViews(); document.getElementById("profileView").classList.remove("hidden");
  }

  function openTransactionModal(custId, type, label) {
    const modal = document.createElement("div");
    modal.className = "modal-overlay";
    modal.innerHTML = `<div class="modal-content"><h3>${label}</h3><input type="number" id="amount" placeholder="رقم"><input type="text" id="desc" placeholder="تفصیل"><input type="file" id="receipt" accept="image/*"><button id="confirmTxn" class="btn-primary">محفوظ کریں</button><button id="cancelTxn" class="view-btn">منسوخ</button></div>`;
    document.body.appendChild(modal);
    document.getElementById("confirmTxn").onclick = async () => {
      let amount = parseFloat(modal.querySelector("#amount").value);
      if(!amount) return;
      const file = modal.querySelector("#receipt").files[0];
      let receiptUrl = file ? await getBase64(file) : "";
      transactions.push({ id: generateId(), customerId: custId, date: new Date().toISOString(), amount, type, description: modal.querySelector("#desc").value || label, receiptUrl });
      saveTransactions(); modal.remove();
    };
    document.getElementById("cancelTxn").onclick = () => modal.remove();
  }

  function deleteTransaction(txnId) { transactions = transactions.filter(t => t.id !== txnId); saveTransactions(); }

  function renderGlobalTransactions() {
    let filtered = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
    let html = `<div class="txn-list">` + filtered.map(t => {
      let cust = customers.find(c=>c.id===t.customerId);
      return `<div class="transaction-card" style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${cust?.name || '?'}</strong><br><small>${new Date(t.date).toLocaleDateString()}</small></div><div class="${t.type==="Credit"?"income-color":"expense-color"}"><strong>${t.amount.toLocaleString()}</strong></div></div>`;
    }).join('') + `</div>`;
    document.getElementById("transactionsView").innerHTML = html;
  }

  function renderShareSection() {
    let html = `<div class="card" style="text-align:center"><h3>بینک معلومات</h3><input id="bankName" value="${bankDetails.name}"><input id="bankAccount" value="${bankDetails.account}"><button id="saveBank" class="btn-primary">محفوظ کریں</button><div id="qrcode"></div></div>`;
    document.getElementById("shareView").innerHTML = html;
    new QRCode(document.getElementById("qrcode"), { text: `بینک: ${bankDetails.name}\nاکاؤنٹ: ${bankDetails.account}`, width: 150, height: 150 });
    document.getElementById("saveBank").onclick = () => { bankDetails.name = document.getElementById("bankName").value; bankDetails.account = document.getElementById("bankAccount").value; saveBankDetails(); };
  }

  let activeTab = "dashboard";
  function hideAllViews() { ["dashboardView","customersView","transactionsView","profileView","shareView"].forEach(id => document.getElementById(id).classList.add("hidden")); }
  function switchTab(tab) {
    activeTab = tab; hideAllViews();
    if(tab === "dashboard") renderDashboard();
    else if(tab === "customers") renderCustomersList();
    else if(tab === "transactions") renderGlobalTransactions();
    else if(tab === "share") renderShareSection();
    document.getElementById(tab+"View").classList.remove("hidden");
    document.querySelectorAll(".nav-item").forEach(btn => btn.classList.toggle("active", btn.dataset.nav === tab));
    document.getElementById("fabAddCustomer").classList.toggle("hidden", tab !== "customers");
  }

  function initAuth() {
    auth.onAuthStateChanged(user => {
      if (user) { document.getElementById("loginContainer").style.display="none"; document.getElementById("appContainer").classList.remove("hidden"); loadData(); switchTab("dashboard"); }
      else { document.getElementById("loginContainer").style.display="flex"; document.getElementById("appContainer").classList.add("hidden"); }
    });
    document.getElementById("loginBtn").onclick = () => {
      auth.signInWithEmailAndPassword(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value).catch(e => alert(e.message));
    };
    document.getElementById("logoutBtn").onclick = () => auth.signOut();
  }

  window.onload = () => {
    initAuth();
    document.getElementById("darkModeToggle").onclick = () => document.body.classList.toggle("dark");
    document.querySelectorAll(".nav-item").forEach(btn => btn.onclick = () => switchTab(btn.dataset.nav));
    document.getElementById("fabAddCustomer").onclick = () => {
      const name = prompt("کسٹمر کا نام درج کریں:");
      if(name) { customers.push({ id: generateId(), name, phone: "", accountNumber: "", profilePic: "" }); saveCustomers(); }
    };
  };
</script>
</body>
</html>
